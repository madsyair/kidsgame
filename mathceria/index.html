  h+='<div style="display:flex;gap:6px"><button onclick="goC(\''+c+'\')" class="bh" style="flex:1;padding:9px;border-radius:12px;border:2px solid '+co+'44;background:#fff;color:'+co+';font-size:11px;font-weight:700;cursor:pointer">📋 '+t('levels')+'</button><button onclick="goH()" class="bh" style="flex:1;padding:9px;border-radius:12px;border:2px solid #ddd;background:#fff;color:#666;font-size:11px;font-weight:700;cursor:pointer">🏠 '+t('menu')+'</button></div></div></div></div>';
  el.innerHTML=h;
}

function rSc(el){
  let tB=0,tM=0,tP=0,tN=0;CID.forEach(c=>{for(let i=1;i<=LEVELS_PER_CAT;i++){let d=S.ld[c][i],l=lv(c,i);tB+=d.b;tM+=l.mx;tP+=d.p;tN+=d.n}});
  let h='<div class="scr" style="background:linear-gradient(160deg,#0d1b2a,#1b263b,#415a77);color:#fff;padding:0 0 24px">';
  h+='<div style="background:linear-gradient(135deg,#FFD54F,#FF8F00);padding:12px 14px;display:flex;align-items:center;justify-content:space-between"><button onclick="goH()" class="bh" style="background:rgba(0,0,0,.12);border:none;border-radius:10px;padding:6px 12px;color:#fff;font-weight:800;cursor:pointer;font-size:11px">\u2190 '+t('menu')+'</button><div style="font-family:var(--fd);font-size:16px;color:#333">🏆 '+t('scoreboard')+'</div><button onclick="shG()" class="bh" style="background:rgba(0,0,0,.12);border:none;border-radius:10px;padding:6px 12px;color:#fff;font-weight:800;cursor:pointer;font-size:11px">📤</button></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:11px;max-width:460px;margin:0 auto">';
  [{l:t('total'),v:tB,s:'/'+tM,c:'#FFD54F',i:'🏅'},{l:t('perf'),v:tP,s:'×',c:'#69F0AE',i:'⭐'},{l:t('played'),v:tN,s:'×',c:'#82B1FF',i:'🎮'}].forEach((c,i)=>{h+='<div style="background:rgba(255,255,255,.08);border-radius:12px;padding:11px 6px;text-align:center;border:1px solid '+c.c+'33"><div style="font-size:18px;margin-bottom:2px">'+c.i+'</div><div style="font-family:var(--fd);font-size:17px;color:'+c.c+'">'+c.v+'</div><div style="font-size:9px;color:rgba(255,255,255,.4);font-weight:700">'+c.l+' '+c.s+'</div></div>'});h+='</div>';
  CID.forEach(ci=>{h+='<div style="padding:0 10px;max-width:460px;margin:5px auto 0"><div style="font-weight:800;font-size:12px;color:'+CC[ci]+';margin-bottom:4px">'+CI[ci]+' '+catNm(ci)+'</div>';
    for(let id=1;id<=LEVELS_PER_CAT;id++){let d=S.ld[ci][id],l=lv(ci,id),p=Math.round(d.b/l.mx*100),u=isU(ci,id);
      h+='<div style="background:'+(u?'rgba(255,255,255,.05)':'rgba(255,255,255,.02)')+';border-radius:10px;padding:8px 10px;margin-bottom:4px;border:'+(d.b>=l.mx?'1px solid #FFD54F44':'1px solid rgba(255,255,255,.05)')+';opacity:'+(u?1:.4)+';display:flex;align-items:center;gap:8px"><div style="font-size:18px;width:26px;text-align:center">'+(u?IC[id-1]:'🔒')+'</div><div style="flex:1"><div style="display:flex;justify-content:space-between"><span style="font-weight:700;font-size:10px">Lv.'+id+' '+lvNm(ci,id)+'</span><span style="font-family:var(--fd);font-size:11px;color:'+(p>=100?'#FFD54F':p>0?'#69F0AE':'#555')+'">'+d.b+'<span style="font-size:8px;color:#888">/'+l.mx+'</span></span></div><div style="height:4px;background:rgba(255,255,255,.1);border-radius:4px;margin:2px 0;overflow:hidden"><div style="height:100%;width:'+p+'%;background:'+(p>=100?'linear-gradient(90deg,#FFD54F,#FF8F00)':CC[ci])+';border-radius:4px"></div></div><div style="font-size:8px;color:rgba(255,255,255,.3);font-weight:700">⭐'+d.p+'× \u2022 🎮'+d.n+'×</div></div></div>'}
    h+='</div>'});
  h+='</div>';el.innerHTML=h;
}

// ═══════ INSTALL BANNER ═══════
const IB_KEY='mathceria_install_dismissed';
let ibPrompt=null;
let ibMode=null; // 'native','manual', or null
let ibDetect={browser:'Browser',device:'',steps:''};

/** Detect browser/OS and prepare install instructions */
(function initInstallBanner(){
  // Already dismissed or installed?
  try{if(localStorage.getItem(IB_KEY))return}catch(e){}
  if(window.matchMedia('(display-mode:standalone)').matches)return;
  if(window.navigator.standalone===true)return;

  const ua=navigator.userAgent||'';
  const isIOS=/iPhone|iPad|iPod/.test(ua),isAnd=/Android/.test(ua);
  const isMob=isIOS||isAnd;
  const isSaf=/Safari/.test(ua)&&!/Chrome|CriOS|FxiOS|EdgiOS/.test(ua);
  const isChr=/Chrome/.test(ua)&&!/Edg|OPR|Samsung/.test(ua);
  const isCriOS=/CriOS/.test(ua);
  const isEdg=/Edg/.test(ua),isFf=/Firefox|FxiOS/.test(ua);
  const isSam=/SamsungBrowser/.test(ua),isOp=/OPR/.test(ua);
  const isMac=/Macintosh/.test(ua),isWin=/Windows/.test(ua);

  let br='Browser';
  if(isSaf)br='Safari';else if(isCriOS)br='Chrome';else if(isEdg)br='Edge';
  else if(isSam)br='Samsung Internet';else if(isOp)br='Opera';
  else if(isFf)br='Firefox';else if(isChr)br='Chrome';
  let dv=isAnd?'Android':isIOS?'iPhone/iPad':isWin?'Windows':isMac?'Mac':'PC';
  ibDetect.browser=br;ibDetect.device=dv;

  // Build steps (these are visual UI terms, kept as-is since they reference browser UI)
  let st='';
  if(isIOS&&isSaf) st='<div><span class="si">1️⃣</span> <b>Share</b> ⎙</div><div><span class="si">2️⃣</span> <b>"Add to Home Screen"</b></div><div><span class="si">3️⃣</span> <b>"Add"</b></div>';
  else if(isIOS&&isCriOS) st='<div><span class="si">1️⃣</span> <b>Share</b> ⎙</div><div><span class="si">2️⃣</span> <b>"Add to Home Screen"</b></div><div><span class="si">💡</span> Safari = best</div>';
  else if(isIOS) st='<div><span class="si">💡</span> Open in <b>Safari</b></div><div><span class="si">👉</span> Share → <b>Add to Home Screen</b></div>';
  else if(isAnd&&(isChr||isOp)) st='<div><span class="si">1️⃣</span> <b>⋮</b> (top right)</div><div><span class="si">2️⃣</span> <b>"Install app"</b></div>';
  else if(isAnd&&isSam) st='<div><span class="si">1️⃣</span> <b>☰</b> (bottom)</div><div><span class="si">2️⃣</span> <b>"Add to Home screen"</b></div>';
  else if(isAnd&&isFf) st='<div><span class="si">1️⃣</span> <b>⋮</b> (top right)</div><div><span class="si">2️⃣</span> <b>"Install"</b></div>';
  else if(isAnd&&isEdg) st='<div><span class="si">1️⃣</span> <b>⋯</b> (bottom)</div><div><span class="si">2️⃣</span> <b>"Add to phone"</b></div>';
  else if(!isMob&&isChr) st='<div><span class="si">1️⃣</span> 📲 in address bar</div><div><span class="si">2️⃣</span> <b>"Install"</b></div>';
  else if(!isMob&&isEdg) st='<div><span class="si">1️⃣</span> 📲 in address bar</div><div><span class="si">2️⃣</span> <b>"Install"</b></div>';
  else if(!isMob&&isSaf) st='<div><span class="si">1️⃣</span> <b>File</b> → <b>"Add to Dock"</b></div>';
  else if(!isMob&&isFf) st='<div><span class="si">⚠️</span> Use <b>Chrome</b>/<b>Edge</b></div><div><span class="si">📌</span> Or bookmark</div>';
  else if(isMob) st='<div><span class="si">1️⃣</span> Browser menu</div><div><span class="si">2️⃣</span> <b>"Add to Home Screen"</b></div>';
  else st='<div><span class="si">1️⃣</span> 📲 in address bar</div><div><span class="si">2️⃣</span> <b>"Install"</b></div>';
  ibDetect.steps=st;

  // Listen for native install prompt (Chromium)
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();ibPrompt=e;ibMode='native';
    if(S.sc==='home')ren(); // re-render to show native install button
  });
  // Fallback: show manual instructions after delay
  setTimeout(function(){if(!ibPrompt){ibMode='manual';if(S.sc==='home')ren()}},1500);
})();

/** Generate install banner HTML for home screen. Returns '' if not applicable. */
function getIB(){
  try{if(localStorage.getItem(IB_KEY))return''}catch(e){}
  if(window.matchMedia('(display-mode:standalone)').matches)return'';
  if(window.navigator.standalone===true)return'';
  if(!ibMode)return'';

  let h='<div class="ib"><button class="ib-x" onclick="ibDismiss()" aria-label="Close">&times;</button>';
  h+='<div class="ib-hd"><span>📲</span><span>'+t('ibTitle')+' '+ibDetect.device+'</span></div>';

  if(ibMode==='native'){
    h+='<div class="ib-ds">'+t('ibDesc')+'</div>';
    h+='<button class="ib-bt" onclick="ibInstall()">📲 '+t('ibBtn')+'</button>';
    h+='<div class="ib-ft">'+t('ibNoStore')+'</div>';
  }else{
    h+='<div class="ib-ds">'+t('ibDescManual')+'</div>';
    h+='<div class="ib-st">'+ibDetect.steps+'</div>';
    h+='<div class="ib-ft">🔍 '+ibDetect.browser+' · '+ibDetect.device+'</div>';
  }
  h+='</div>';
  return h;
}
function ibDismiss(){try{localStorage.setItem(IB_KEY,'1')}catch(e){}ren()}
function ibInstall(){
  if(ibPrompt){ibPrompt.prompt();ibPrompt.userChoice.then(function(r){if(r.outcome==='accepted'){ibDismiss()}ibPrompt=null})}
}

ren();
</script></body></html>
